# Render Blueprint: one Docker web service (Fastify API + the built web client)
# plus a managed Postgres. Pushing this repo to GitHub and pointing Render at it
# ("New + → Blueprint") provisions both. Docs: https://render.com/docs/blueprint-spec
#
# NB on the free tier: the web service sleeps after ~15 min idle (first request
# then cold-starts in ~1 min), and a free Postgres is removed 30 days after
# creation. Bump either `plan` to a paid tier to avoid both.

databases:
  - name: notes-db
    plan: free
    region: frankfurt
    databaseName: notes
    user: notes

services:
  - type: web
    name: notes-app
    runtime: docker
    plan: free
    region: frankfurt # must match the database region for the internal connection
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: notes-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true # Render generates a strong secret; do NOT use the dev default
